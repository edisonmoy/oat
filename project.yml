name: Oat
options:
  bundleIdPrefix: com.oat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Oat:
    type: application
    platform: macOS
    sources:
      - path: Sources/Oat
    dependencies:
      - package: GRDB
      - package: WhisperKit
      - sdk: NaturalLanguage.framework
      - sdk: PDFKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oat.Oat
        PRODUCT_NAME: Oat
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        # Phase 2: microphone + screen-capture (system audio via ScreenCaptureKit)
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Oat records your microphone to transcribe what you say during meetings."
        INFOPLIST_KEY_NSScreenCaptureDescription: "Oat captures system audio so it can transcribe the other participants in your meetings."
        # Phase 5: calendar access
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Oat reads your calendar to auto-title meeting notes and pull in attendees."
    entitlements:
      path: Sources/Oat/Oat.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

  OatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/OatTests
    dependencies:
      - target: Oat
      - package: GRDB

schemes:
  Oat:
    build:
      targets:
        Oat: all
        OatTests: [test]
    run:
      config: Debug
    test:
      targets:
        - OatTests
