name: Oat
options:
  bundleIdPrefix: com.oat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Oat:
    type: application
    platform: macOS
    sources:
      - path: Sources/Oat
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oat.Oat
        PRODUCT_NAME: Oat
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        # Phase 2 will add the audio-input entitlement + usage descriptions here.

  OatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/OatTests
    dependencies:
      - target: Oat
      - package: GRDB

schemes:
  Oat:
    build:
      targets:
        Oat: all
        OatTests: [test]
    run:
      config: Debug
    test:
      targets:
        - OatTests
